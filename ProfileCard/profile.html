<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>

    <!-- css -->
    <link rel="stylesheet" href="/ProfileCard/profile.css">

    <!-- boxicon -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

</head>
<body>
    <div class="profile-card">
        <div class="image">
            <img src="/ProfileCard/ProfileCard.jpeg" alt="" class="profile-image">
        </div>
    
        <div class="text-data">
        <span class="name">ChatBot</span>
        <span class="job">Coder and Developer</span>
        </div>

        <div class="media-buttons">
        <a href="#" style="background-color:#4267b2 ;" class="link">
            <i class='bx bxl-facebook'></i>
        </a>
         <a href="#" style="background-color:#1da1f2 ;" class="link">
            <i class='bx bxl-twitter' ></i>
        </a>
         <a href="#" style="background-color:#e1306c ;" class="link">
           <i class='bx bxl-instagram' ></i>
        </a>
         <a href="#" style="background-color:#1B1F23 ;" class="link">
            <i class='bx bxl-github' ></i>
        </a>
        </div>

        <div class="buttons">
        <button class="button">Contact Us</button>
        </div>

    </div>
</body>
</html>
